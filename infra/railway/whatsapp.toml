# Servicio WhatsApp (Baileys). Volumen + WA_AUTH_DIR; una réplica.
#
#   RAILPACK_CONFIG_FILE=infra/railpack/whatsapp.json
# Vaciá Custom Build Command si tenés start:whatsapp u otro start ahí.

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build:whatsapp"

[deploy]
startCommand = "npm run start:whatsapp"
