# Servicio Workers (BullMQ), mismo repo.
#
# En Railway → Variables del servicio:
#   RAILPACK_CONFIG_FILE=infra/railpack/workers.json
#
# En Settings → Build: vaciá "Custom Build Command" (no pongas npm run start:workers ahí).
#
# El JSON fuerza: build = npm run build:workers, start = npm run start:workers.

[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run start:workers"
